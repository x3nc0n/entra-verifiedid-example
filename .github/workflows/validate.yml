name: PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

  bicep-validate:
    name: Validate Bicep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep \
            https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/bicep
          bicep --version

      - name: Build Bicep (lint & compile check)
        run: bicep build infra/main.bicep --outfile /dev/null

      - name: Validate ARM template JSON
        run: |
          python3 -c "
          import json, sys
          try:
              with open('azuredeploy.json') as f:
                  data = json.load(f)
              schema = data.get('\$schema', '')
              if 'deploymentTemplate' not in schema:
                  print('ERROR: Not a valid ARM template schema:', schema)
                  sys.exit(1)
              print('azuredeploy.json is valid ARM JSON')
              print('Schema:', schema)
              print('Resources:', len(data.get('resources', [])))
          except json.JSONDecodeError as e:
              print('ERROR: Invalid JSON:', e)
              sys.exit(1)
          "

      - name: Check ARM template parameters
        run: |
          python3 -c "
          import json, sys
          with open('azuredeploy.json') as f:
              arm = json.load(f)
          params = set(arm.get('parameters', {}).keys())
          required = {
              'appName','location','azureTenantId','azureClientId',
              'verifiedIdAuthority','credentialManifestUrl','credentialType',
              'identityPassEndpoint','fido2RpName','fido2RpId','fido2Origin','demoMode'
          }
          forbidden = {'azureClientSecret'}
          missing = sorted(required - params)
          unexpected = sorted(forbidden & params)
          if missing:
              print('ERROR: Missing required parameters:', missing)
              sys.exit(1)
          if unexpected:
              print('ERROR: Forbidden legacy parameters still present:', unexpected)
              sys.exit(1)
          print('ARM parameter set matches Container Apps template expectations')
          "

      - name: Check ARM template targets Container Apps
        run: |
          python3 -c "
          import json, sys
          with open('azuredeploy.json') as f:
              arm = json.load(f)
          resource_types = {r.get('type') for r in arm.get('resources', [])}
          required = {
              'Microsoft.App/managedEnvironments',
              'Microsoft.App/containerApps',
              'Microsoft.ContainerRegistry/registries'
          }
          forbidden = {'Microsoft.Web/serverfarms', 'Microsoft.Web/sites'}
          missing = sorted(required - resource_types)
          legacy = sorted(forbidden & resource_types)
          if missing:
              print('ERROR: Missing Container Apps resource types:', missing)
              sys.exit(1)
          if legacy:
              print('ERROR: Legacy App Service resources still present:', legacy)
              sys.exit(1)
          print('ARM resources target Azure Container Apps with ACR')
          "

      - name: Check Container App registry wiring
        run: |
          python3 -c "
          import json, sys
          with open('azuredeploy.json') as f:
              arm = json.load(f)
          apps = [r for r in arm.get('resources', []) if r.get('type') == 'Microsoft.App/containerApps']
          if len(apps) != 1:
              print('ERROR: Expected exactly one Container App resource')
              sys.exit(1)
          app = apps[0]
          config = app.get('properties', {}).get('configuration', {})
          registries = config.get('registries', [])
          if not registries:
              print('ERROR: Container App is missing registry configuration')
              sys.exit(1)
          registry = registries[0]
          if registry.get('identity') != 'system':
              print('ERROR: Container App registry auth must use the system-assigned identity')
              sys.exit(1)
          server = registry.get('server', '')
          if '.azurecr.io' not in server:
              print('ERROR: Container App registry server is not an Azure Container Registry:', server)
              sys.exit(1)
          args = app.get('properties', {}).get('template', {}).get('containers', [{}])[0].get('args', [])
          if 'npm start' in args:
              print('ERROR: Placeholder runtime still uses npm start on a base image')
              sys.exit(1)
          print('Container App registry wiring and bootstrap placeholder are coherent')
          "

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Check for secrets in diff
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified
