name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment:
      name: staging
      url: https://${{ vars.AZURE_CONTAINER_APP_FQDN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC via UAMI)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install Container Apps CLI extension
        run: az extension add --name containerapp --upgrade --only-show-errors

      - name: Compute image reference
        id: image
        shell: bash
        run: |
          image_repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          image="${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}/${image_repo}:${GITHUB_SHA}"
          echo "repository=$image_repo" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry "${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}" \
            --file Dockerfile \
            --image "${{ steps.image.outputs.repository }}:${GITHUB_SHA}" \
            --image "${{ steps.image.outputs.repository }}:latest" \
            .

      - name: Configure Container App registry identity
        run: |
          az containerapp registry set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
            --server "${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}" \
            --identity system \
            --only-show-errors

      - name: Deploy image to Container App
        run: |
          az containerapp update \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
            --image "${{ steps.image.outputs.image }}" \
            --only-show-errors

      - name: Configure Key Vault-backed secrets
        shell: bash
        run: |
          az containerapp secret set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
            --secrets "identitypass-key=keyvaultref:${{ vars.KEY_VAULT_URL }}secrets/identitypass-key,identityref:system" \
            --only-show-errors
          az containerapp update \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
            --set-env-vars "IDENTITYPASS_SUBSCRIPTION_KEY=secretref:identitypass-key" \
            --only-show-errors

      - name: Resolve staging FQDN
        id: fqdn
        shell: bash
        run: |
          fqdn="$(az containerapp show \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
            --query properties.configuration.ingress.fqdn \
            -o tsv)"
          if [ -z "$fqdn" ]; then
            echo "::error::Container App FQDN was empty"
            exit 1
          fi
          echo "fqdn=$fqdn" >> "$GITHUB_OUTPUT"

      - name: Smoke test staging
        shell: bash
        run: |
          url="https://${{ steps.fqdn.outputs.fqdn }}/health"
          echo "Waiting for $url"
          for attempt in {1..12}; do
            status="$(curl -sS -o /dev/null -w '%{http_code}' "$url" || true)"
            if [ "$status" = "200" ]; then
              echo "Staging health check passed (HTTP $status)"
              exit 0
            fi
            echo "Attempt $attempt/12 returned HTTP ${status:-curl-error}; retrying in 10s..."
            sleep 10
          done
          echo "::error::Staging health check failed for $url"
          exit 1

  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy-staging
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: https://${{ vars.AZURE_CONTAINER_APP_FQDN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC via UAMI)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install Container Apps CLI extension
        run: az extension add --name containerapp --upgrade --only-show-errors

      - name: Compute image reference
        id: image
        shell: bash
        run: |
          image_repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          image="${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}/${image_repo}:${GITHUB_SHA}"
          echo "repository=$image_repo" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry "${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}" \
            --file Dockerfile \
            --image "${{ steps.image.outputs.repository }}:${GITHUB_SHA}" \
            --image "${{ steps.image.outputs.repository }}:latest" \
            .

      - name: Configure Container App registry identity
        run: |
          az containerapp registry set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
            --server "${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}" \
            --identity system \
            --only-show-errors

      - name: Deploy image to Container App
        run: |
          az containerapp update \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
            --image "${{ steps.image.outputs.image }}" \
            --only-show-errors

      - name: Configure Key Vault-backed secrets
        shell: bash
        run: |
          az containerapp secret set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
            --secrets "identitypass-key=keyvaultref:${{ vars.KEY_VAULT_URL }}secrets/identitypass-key,identityref:system" \
            --only-show-errors
          az containerapp update \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
            --set-env-vars "IDENTITYPASS_SUBSCRIPTION_KEY=secretref:identitypass-key" \
            --only-show-errors

      - name: Resolve production FQDN
        id: fqdn
        shell: bash
        run: |
          fqdn="$(az containerapp show \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
            --query properties.configuration.ingress.fqdn \
            -o tsv)"
          if [ -z "$fqdn" ]; then
            echo "::error::Container App FQDN was empty"
            exit 1
          fi
          echo "fqdn=$fqdn" >> "$GITHUB_OUTPUT"

      - name: Verify production health
        shell: bash
        run: |
          url="https://${{ steps.fqdn.outputs.fqdn }}/health"
          echo "Waiting for $url"
          for attempt in {1..12}; do
            status="$(curl -sS -o /dev/null -w '%{http_code}' "$url" || true)"
            if [ "$status" = "200" ]; then
              echo "Production health check passed (HTTP $status)"
              exit 0
            fi
            echo "Attempt $attempt/12 returned HTTP ${status:-curl-error}; retrying in 10s..."
            sleep 10
          done
          echo "::error::Production health check failed for $url"
          exit 1
