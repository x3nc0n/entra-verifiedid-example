name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write    # Required for OIDC federated credential auth
  contents: read

jobs:
  # ── Job 1: Build ─────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

      - name: Create deployment package
        run: |
          zip -r deployment.zip . \
            --exclude "*.git*" \
            --exclude "node_modules/*" \
            --exclude "coverage/*" \
            --exclude "*.test.*" \
            --exclude "infra/*" \
            --exclude ".github/*"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deployment.zip
          retention-days: 7

  # ── Job 2: Deploy to Staging ─────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
      url: https://${{ vars.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          slot-name: staging
          package: deployment.zip

      - name: Smoke test staging
        run: |
          echo "Waiting for slot to warm up..."
          sleep 20
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ vars.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net/health")
          if [ "$status" != "200" ]; then
            echo "::error::Staging health check returned HTTP $status"
            exit 1
          fi
          echo "Staging health check passed (HTTP $status)"

  # ── Job 3: Deploy to Production ──────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service production slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          slot-name: production
          package: deployment.zip

      - name: Verify production health
        run: |
          echo "Waiting for production slot to warm up..."
          sleep 20
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net/health")
          if [ "$status" != "200" ]; then
            echo "::error::Production health check returned HTTP $status"
            exit 1
          fi
          echo "Production health check passed (HTTP $status)"
